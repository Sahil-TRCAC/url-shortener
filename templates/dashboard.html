<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideDown 0.5s ease;
        }

        .logo h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
        }

        .logo p {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #ff3838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,71,87,0.3);
        }

        .create-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease;
        }

        .create-card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .url-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .url-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .shorten-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .shorten-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result a {
            color: #2c3e50;
            font-weight: bold;
            text-decoration: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }

        .urls-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .urls-card h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .url-item {
            background: #f8f9fa;
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        .url-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .url-info {
            flex: 1;
        }

        .short-url {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .original-url {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .url-stats {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .stat-badge {
            background: #e0e0e0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #555;
        }

        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #218838;
            transform: scale(1.05);
        }

        .analytics-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .analytics-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(245,87,108,0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 0;
            width: 90%;
            max-width: 600px;
            border-radius: 20px;
            animation: slideDown 0.3s ease;
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
        }

        .modal-body {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .url-item {
                flex-direction: column;
                gap: 15px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>⚡ ShortLink Pro</h1>
                <p>Smart URL Shortener with Analytics</p>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar"></div>
                <span id="username" style="font-weight: 500;"></span>
                <a href="/logout/" class="logout-btn">🚪 Logout</a>
            </div>
        </div>

        <div class="create-card">
            <h2>✨ Create New Short URL</h2>
            <div class="input-group">
                <input type="url" id="urlInput" class="url-input" placeholder="https://example.com/your-very-long-url-here">
                <button onclick="createShortURL()" class="shorten-btn" id="shortenBtn">
                    🔗 Shorten URL
                </button>
            </div>
            <div id="result" class="result"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-number" id="totalUrls">0</div>
                <div class="stat-label">Total URLs Created</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👆</div>
                <div class="stat-number" id="totalClicks">0</div>
                <div class="stat-label">Total Clicks</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-number" id="avgClicks">0</div>
                <div class="stat-label">Average Clicks/URL</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-number" id="topUrl">0</div>
                <div class="stat-label">Top URL Clicks</div>
            </div>
        </div>

        <div class="urls-card">
            <h2>📋 Your Shortened URLs</h2>
            <div id="urlsList"></div>
        </div>
    </div>

    <div id="analyticsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>📈 URL Analytics</h2>
            </div>
            <div class="modal-body" id="modalBody">
                Loading...
            </div>
        </div>
    </div>

    <script>
        // Set user info
        const username = "{{ user.username }}";
        document.getElementById('username').innerText = username;
        document.getElementById('userAvatar').innerText = username.charAt(0).toUpperCase();

        // Create Short URL
        async function createShortURL() {
            const url = document.getElementById('urlInput').value;
            if (!url) {
                alert('❌ Please enter a URL');
                return;
            }

            const btn = document.getElementById('shortenBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="loading"></div> Processing...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/create/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({url: url})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const shortUrl = `${window.location.origin}/${data.short_code}`;
                    const resultDiv = document.getElementById('result');
                    resultDiv.innerHTML = `
                        ✅ <strong>Success!</strong> Your short URL is ready:<br>
                        📎 <strong id="shortUrlText">${shortUrl}</strong>
                        <br><br>
                        <button onclick="copyToClipboard()" class="copy-btn" style="background: #28a745; padding: 8px 20px;">
                            📋 Copy to Clipboard
                        </button>
                        <a href="/${data.short_code}" target="_blank" style="background: #007bff; color: white; text-decoration: none; padding: 8px 20px; border-radius: 8px; display: inline-block; margin-left: 10px;">
                            🔗 Test Link
                        </a>
                        <br><br>
                        <small>🔄 Redirects to: ${data.original_url}</small>
                    `;
                    resultDiv.style.display = 'block';
                    document.getElementById('urlInput').value = '';
                    loadDashboard();
                    
                    setTimeout(() => {
                        resultDiv.style.display = 'none';
                    }, 8000);
                }
            } catch (error) {
                alert('❌ Error creating short URL');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Copy to clipboard function
        function copyToClipboard() {
            const shortUrl = document.getElementById('shortUrlText').innerText;
            navigator.clipboard.writeText(shortUrl).then(function() {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = '✅ Copied!';
                btn.style.background = '#218838';
                setTimeout(function() {
                    btn.innerText = originalText;
                    btn.style.background = '#28a745';
                }, 2000);
            }).catch(function(err) {
                alert('✅ Link: ' + shortUrl);
            });
        }

        // Copy specific URL
        function copySpecificUrl(url) {
            navigator.clipboard.writeText(url).then(function() {
                alert('✅ Link copied to clipboard!\n\n' + url);
            }).catch(function(err) {
                alert('✅ Link: ' + url);
            });
        }

        // Load Dashboard
        async function loadDashboard() {
            try {
                const response = await fetch('/api/dashboard/');
                const data = await response.json();
                
                document.getElementById('totalUrls').innerText = data.total_urls;
                document.getElementById('totalClicks').innerText = data.total_clicks;
                const avgClicks = data.total_urls > 0 ? (data.total_clicks / data.total_urls).toFixed(1) : 0;
                document.getElementById('avgClicks').innerText = avgClicks;
                
                let maxClicks = 0;
                for (let url of data.urls) {
                    if (url.clicks > maxClicks) maxClicks = url.clicks;
                }
                document.getElementById('topUrl').innerText = maxClicks;
                
                let html = '';
                if (data.urls.length === 0) {
                    html = '<div style="text-align: center; padding: 40px; color: #999;">🚀 No URLs yet. Create your first short URL above!</div>';
                } else {
                    for (let url of data.urls) {
                        const fullUrl = `http://127.0.0.1:8000/${url.short_code}`;
                        html += `
                            <div class="url-item">
                                <div class="url-info">
                                    <div class="short-url">
                                        🔗 /${url.short_code}
                                        <button onclick="copySpecificUrl('${fullUrl}')" class="copy-btn" style="background: #28a745; padding: 3px 12px;">
                                            📋 Copy
                                        </button>
                                    </div>
                                    <div class="original-url">📎 ${url.original_url}</div>
                                    <div class="url-stats">
                                        <span class="stat-badge">👆 ${url.clicks} clicks</span>
                                        <span class="stat-badge">📅 ${url.created_at}</span>
                                    </div>
                                </div>
                                <button class="analytics-btn" onclick="viewAnalytics('${url.short_code}')">
                                    📊 View Analytics
                                </button>
                            </div>
                        `;
                    }
                }
                document.getElementById('urlsList').innerHTML = html;
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // View Analytics
        async function viewAnalytics(shortCode) {
            const modal = document.getElementById('analyticsModal');
            modal.style.display = 'block';
            document.getElementById('modalBody').innerHTML = '<div style="text-align: center; padding: 40px;"><div class="loading"></div> Loading analytics...</div>';
            
            try {
                const response = await fetch(`/api/analytics/${shortCode}/`);
                const data = await response.json();
                
                let devicesHtml = '';
                if (Object.keys(data.devices).length === 0) {
                    devicesHtml = '<p style="color: #999;">No device data yet. Share your link to see analytics!</p>';
                } else {
                    for (let [device, count] of Object.entries(data.devices)) {
                        const percentage = data.total_clicks > 0 ? ((count / data.total_clicks) * 100).toFixed(1) : 0;
                        devicesHtml += `
                            <div style="margin: 15px 0;">
                                <strong>📱 ${device.toUpperCase()}</strong>: ${count} clicks (${percentage}%)
                                <div style="background: #e0e0e0; height: 8px; border-radius: 4px; margin-top: 5px;">
                                    <div style="background: linear-gradient(90deg, #667eea, #764ba2); width: ${percentage}%; height: 8px; border-radius: 4px;"></div>
                                </div>
                            </div>
                        `;
                    }
                }
                
                let recentHtml = '';
                if (data.recent_clicks.length === 0) {
                    recentHtml = '<p style="color: #999;">No clicks yet. Share your link to see activity!</p>';
                } else {
                    for (let click of data.recent_clicks) {
                        recentHtml += `
                            <div style="padding: 10px; border-bottom: 1px solid #e0e0e0;">
                                🕒 ${click.time}<br>
                                📱 Device: ${click.device}<br>
                                🌐 IP: ${click.ip}
                            </div>
                        `;
                    }
                }
                
                document.getElementById('modalBody').innerHTML = `
                    <div style="margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 10px;">
                        <strong>🔗 Original URL:</strong><br>
                        <a href="${data.original_url}" target="_blank" style="color: #667eea; word-break: break-all;">${data.original_url}</a>
                    </div>
                    <div style="margin-bottom: 20px; text-align: center;">
                        <strong>📊 Total Clicks:</strong> 
                        <span style="font-size: 36px; font-weight: bold; color: #667eea; display: block;">${data.total_clicks}</span>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <strong>📱 Device Breakdown:</strong>
                        ${devicesHtml}
                    </div>
                    <div>
                        <strong>🕐 Recent Clicks (last 10):</strong>
                        ${recentHtml}
                    </div>
                    <div style="margin-top: 20px; text-align: center; padding: 10px; background: #f0f0f0; border-radius: 10px;">
                        <small>✨ Created on: ${data.created_at}</small>
                    </div>
                `;
            } catch (error) {
                document.getElementById('modalBody').innerHTML = '<p style="color: red; text-align: center;">❌ Error loading analytics</p>';
            }
        }

        function closeModal() {
            document.getElementById('analyticsModal').style.display = 'none';
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        window.onclick = function(event) {
            const modal = document.getElementById('analyticsModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
